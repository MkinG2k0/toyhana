services:
  # Локальная БД при необходимости: docker compose --profile local-db up -d postgres
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
      POSTGRES_DB: toykhana
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d toykhana"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: wedding-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      cache_from:
        - wedding-app:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production

  db-migrate:
    profiles: ["migrate"]
    image: wedding-db-migrate:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      cache_from:
        - wedding-db-migrate:latest
    env_file:
      - .env
    environment:
      NODE_ENV: production

volumes:
  postgres_data:
